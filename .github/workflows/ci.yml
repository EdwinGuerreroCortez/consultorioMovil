name: Mobile CI (Android)

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  test_and_build_mobile:
    runs-on: ubuntu-latest

    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      TEST_USER_EMAIL: ${{ secrets.MOBILE_TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.MOBILE_TEST_USER_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run tests (Jest)
        run: npm test -- --forceExit --detectOpenHandles

      # Configurar Java y Android SDK
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Construir el APK con Expo + Gradle
      - name: Build APK
        run: |
          npx expo prebuild --platform android
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
        env:
          EXPO_NO_TELEMETRY: 1

      #  Subir el APK como artifact descargable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      #  Mostrar link directo al APK en los logs
      - name: Show download link
        run: |
          echo " APK disponible en:"
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
