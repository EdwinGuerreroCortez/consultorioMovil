name: Mobile CI (Android)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_android:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Configurar Node
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm install

      # 4. Ejecutar pruebas del módulo móvil
      - name: Run tests (Jest)
        run: npm test

      # 5. Construir APK debug (React Native CLI / Gradle)
      - name: Build Android APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug
          cd ..

      # 6. Subir el APK como artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
