name: Mobile CI (Android)

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  test_and_build_mobile:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Configurar Node
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm install

      # 4. Ejecutar pruebas del módulo móvil
      - name: Run tests (Jest)
        run: npm test

      # 5. Build del proyecto (sin Gradle, sin carpeta android)
      - name: Build JS bundle (Expo)
        run: npm run build
